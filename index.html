<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
  <meta name="robots" content="noindex, nofollow">
<title>Galeria de Referências — Concorrentes</title>
<style>
  :root{--bg:#faf9f7;--card:#fff;--ink:#1c1917;--muted:#78716c;--line:#e7e5e4;--accent:#7c3aed;--like:#e11d48;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,'Segoe UI',Inter,Roboto,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
  .app{max-width:1400px;margin:0 auto;padding:0 18px 60px}
  header{position:sticky;top:0;z-index:30;background:rgba(250,249,247,.92);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);padding:14px 18px;margin:0 -18px 18px}
  .htop{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
  h1{font-size:20px;font-weight:700;letter-spacing:-.02em}
  .htop .sub{font-size:13px;color:var(--muted)}
  .filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:11px}
  .seg{display:inline-flex;background:#f1efed;border:1px solid var(--line);border-radius:9px;padding:3px;flex-wrap:wrap}
  .seg button{border:0;background:transparent;color:var(--muted);font-size:12.5px;font-weight:600;padding:6px 11px;border-radius:6px;cursor:pointer;white-space:nowrap}
  .seg button.on{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.06)}
  .seg.accent button.on{background:var(--accent);color:#fff}
  .spacer{flex:1}
  .btn{font-size:12.5px;font-weight:600;border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:9px;padding:8px 13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
  .btn.fav.on{background:#fff0f3;border-color:#fbcfe0;color:var(--like)}
  .btn.print{background:var(--accent);color:#fff;border-color:var(--accent)}
  .grid{display:grid;gap:16px;grid-template-columns:repeat(auto-fill,minmax(195px,1fr))}
  .grid.size-md{grid-template-columns:repeat(4,1fr)}
  .grid.size-lg{grid-template-columns:repeat(2,1fr)}
  @media(max-width:680px){
    .app{padding:0 12px 40px}
    header{padding:11px 12px;margin:0 -12px 14px}
    h1{font-size:17px}
    .grid{grid-template-columns:repeat(3,1fr);gap:10px}
    .grid.size-md{grid-template-columns:repeat(2,1fr)}
    .grid.size-lg{grid-template-columns:1fr}
    #printBtn{display:none}
  }
  .cardp{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;cursor:pointer;position:relative;transition:.15s}
  .cardp:hover{box-shadow:0 6px 20px rgba(0,0,0,.09);transform:translateY(-2px)}
  .cardp .im{aspect-ratio:4/5;background:#f0eeec;background-size:cover;background-position:center top}
  .cardp .ph{aspect-ratio:4/5;width:100%;object-fit:cover;object-position:center top;display:block;background:#f0eeec}
  .cardp .meta{padding:9px 11px}
  .cardp .nm{font-size:12.5px;font-weight:600;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:32px}
  .cardp .br{font-size:11px;color:var(--muted);margin-top:3px;display:flex;justify-content:space-between}
  .chip{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;color:var(--accent);background:#f3eefe;padding:1px 6px;border-radius:10px}
  .heart{position:absolute;top:8px;right:8px;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.92);
    border:1px solid var(--line);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:2}
  .heart svg{width:18px;height:18px;fill:none;stroke:var(--muted);stroke-width:2}
  .heart.on svg{fill:var(--like);stroke:var(--like)}
  .esg{position:absolute;top:8px;left:8px;font-size:10px;font-weight:700;background:#1c1917;color:#fff;padding:2px 7px;border-radius:6px;z-index:2}
  .empty{text-align:center;color:var(--muted);padding:60px 0;font-size:14px}
  /* lightbox */
  .lb{position:fixed;inset:0;background:rgba(28,25,23,.82);backdrop-filter:blur(3px);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
  .lb.open{display:flex}
  .lbbox{background:#fff;border-radius:16px;max-width:900px;width:100%;max-height:88vh;overflow:hidden;display:grid;grid-template-columns:1fr 300px}
  @media(max-width:780px){.lbbox{grid-template-columns:1fr;max-height:94vh;overflow-y:auto}}
  .lbimg{background:#0f0e0d;display:flex;align-items:center;justify-content:center;position:relative;min-height:300px}
  .lbimg img{max-width:100%;max-height:88vh;object-fit:contain;display:block}
  .lbnav{position:absolute;top:50%;transform:translateY(-50%);width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.9);
    border:0;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center}
  .lbnav.prev{left:12px} .lbnav.next{right:12px}
  .lbthumbs{position:absolute;bottom:10px;left:0;right:0;display:flex;gap:6px;justify-content:center;flex-wrap:wrap;padding:0 10px}
  .lbthumbs img{width:34px;height:42px;object-fit:cover;border-radius:4px;cursor:pointer;opacity:.55;border:2px solid transparent}
  .lbthumbs img.on{opacity:1;border-color:#fff}
  .lbinfo{padding:22px 22px;display:flex;flex-direction:column;gap:12px;overflow-y:auto}
  .lbinfo .nm{font-size:18px;font-weight:700;line-height:1.25}
  .lbinfo .row{font-size:13px;color:var(--muted)}
  .lbinfo .row b{color:var(--ink)}
  .cores{display:flex;flex-wrap:wrap;gap:5px}
  .cores span{font-size:11px;background:#f1efed;padding:2px 8px;border-radius:10px}
  .lbinfo .actions{display:flex;gap:8px;margin-top:auto;flex-wrap:wrap}
  .lbclose{position:absolute;top:14px;right:14px;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.92);border:0;cursor:pointer;font-size:18px;z-index:5}
  a.site{font-size:12.5px;font-weight:600;color:var(--accent);text-decoration:none;border:1px solid #e4d9fb;background:#f3eefe;border-radius:9px;padding:9px 13px}
  /* print */
  #printArea{display:none}
  @media print{
    header,.grid,.lb,.app>.empty{display:none!important}
    body{background:#fff}
    #printArea{display:block}
    #printArea h2{font-size:15px;margin:0 0 10px}
    .pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
    .pcard{break-inside:avoid;border:1px solid #ddd;border-radius:6px;overflow:hidden}
    .pcard img{width:100%;height:auto;display:block}
    .pcard .pc{padding:5px 7px;font-size:10px}
    .pcard .pc b{font-size:11px;display:block}
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="htop"><h1>Galeria de Referências</h1><span class="sub" id="sub"></span></div>
    <div class="filters">
      <div class="seg accent" id="fMarca"></div>
      <div class="seg" id="fTipo"></div>
      <div class="seg" id="fSize"></div>
      <div class="spacer"></div>
      <button class="btn fav" id="favToggle"><span id="favCount">0</span> favoritos</button>
      <button class="btn print" id="printBtn">🖨 Imprimir favoritos</button>
    </div>
  </header>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none"></div>
</div>

<div class="lb" id="lb">
  <div class="lbbox">
    <div class="lbimg">
      <button class="lbnav prev" id="lbPrev">‹</button>
      <img id="lbImg" alt="">
      <button class="lbnav next" id="lbNext">›</button>
      <div class="lbthumbs" id="lbThumbs"></div>
    </div>
    <div class="lbinfo">
      <button class="lbclose" id="lbClose">✕</button>
      <div class="nm" id="lbNome"></div>
      <div class="row" id="lbMarca"></div>
      <div class="row"><b>Cores:</b></div>
      <div class="cores" id="lbCores"></div>
      <div class="actions">
        <button class="btn fav" id="lbFav">♥ favoritar</button>
        <a class="site" id="lbLink" href="#" target="_blank" rel="noopener">ver no site ↗</a>
      </div>
    </div>
  </div>
</div>

<div id="printArea"></div>

0d8dfa0c5/53416-lg.webp"]}, {"marca": "Simple Life", "nome": "vestido camadas", "cod": "14924", "tipo": "Vestido", "link": "https://vesti.co/simplelife/produto/vestido-camadas-14924", "cover": "https://cdn-op.vesti.mobi/68510/baa9b1b9-dfad-4e8b-ac2c-9caf18e63217/28922-lg.webp", "cores": [], "esgotado": false, "fotos": ["https://cdn-op.vesti.mobi/68510/baa9b1b9-dfad-4e8b-ac2c-9caf18e63217/28922-lg.webp", "https://cdn-op.vesti.mobi/68510/baa9b1b9-dfad-4e8b-ac2c-9caf18e63217/97569-lg.webp", "https://cdn-op.vesti.mobi/68510/baa9b1b9-dfad-4e8b-ac2c-9caf18e63217/49857-lg.webp"]}, {"marca": "Simple Life", "nome": "vestido chiffon", "cod": "14927", "tipo": "Vestido", "link": "https://vesti.co/simplelife/produto/vestido-chiffon-14927", "cover": "https://cdn-op.vesti.mobi/68510/4d0250d0-1868-4a10-bc29-1448bb083d0c/26901-lg.webp", "cores": [], "esgotado": false, "fotos": ["https://cdn-op.vesti.mobi/68510/4d0250d0-1868-4a10-bc29-1448bb083d0c/26901-lg.webp", "https://cdn-op.vesti.mobi/68510/4d0250d0-1868-4a10-bc29-1448bb083d0c/87878-lg.webp", "https://cdn-op.vesti.mobi/68510/4d0250d0-1868-4a10-bc29-1448bb083d0c/28062-lg.webp", "https://cdn-op.vesti.mobi/68510/4d0250d0-1868-4a10-bc29-1448bb083d0c/44231-lg.webp"]}]};
const P = DADOS.produtos.map((p,i)=>({...p, _id: p.link || (p.marca+'|'+p.cod+'|'+i)}));
const FAVKEY = 'galeria_concorrentes_favs';
let favs = new Set(JSON.parse(localStorage.getItem(FAVKEY)||'[]'));
const state = {marca:'todas', tipo:'todas', favs:false, size: window.innerWidth<=680 ? 'md' : 'sm'};

const heartSvg = '<svg viewBox="0 0 24 24"><path d="M12 21s-8-5.5-8-11a4.5 4.5 0 0 1 8-2.9A4.5 4.5 0 0 1 20 10c0 5.5-8 11-8 11z"/></svg>';

function saveFavs(){ localStorage.setItem(FAVKEY, JSON.stringify([...favs])); document.getElementById('favCount').textContent = favs.size; }
function isFav(id){ return favs.has(id); }
function toggleFav(id){ if(favs.has(id)) favs.delete(id); else favs.add(id); saveFavs(); render(); if(lbCur && lbCur._id===id) paintLbFav(); }

function seg(id, opts, key){
  const el=document.getElementById(id);
  el.innerHTML=opts.map(o=>`<button data-v="${o[0]}" class="${state[key]===o[0]?'on':''}">${o[1]}</button>`).join('');
  el.querySelectorAll('button').forEach(b=>b.onclick=()=>{state[key]=b.dataset.v; render();});
}

function filtered(){
  return P.filter(p =>
    (state.marca==='todas' || p.marca===state.marca) &&
    (state.tipo==='todas' || p.tipo===state.tipo) &&
    (!state.favs || isFav(p._id)));
}

function render(){
  seg('fMarca', [['todas','Todas as marcas'], ...DADOS.marcas.map(m=>[m,m])], 'marca');
  seg('fTipo', [['todas','Todos os tipos'], ...DADOS.tipos.map(t=>[t,t])], 'tipo');
  seg('fSize', [['sm','Compacto'],['md','Médio'],['lg','Grande']], 'size');
  document.getElementById('favCount').textContent = favs.size;
  document.getElementById('favToggle').classList.toggle('on', state.favs);
  const list = filtered();
  document.getElementById('sub').textContent = `${list.length} de ${P.length} produtos · ${DADOS.gerado}`;
  const grid=document.getElementById('grid'), empty=document.getElementById('empty');
  grid.className = 'grid size-'+state.size;
  if(!list.length){ grid.innerHTML=''; empty.style.display='block';
    empty.textContent = state.favs ? 'Nenhum favorito ainda — clique no ♥ dos produtos que gostar.' : 'Nada aqui.'; return; }
  empty.style.display='none';
  grid.innerHTML = list.map((p,i)=>`
    <div class="cardp" data-i="${i}">
      ${p.esgotado?'<span class="esg">ESGOTADO</span>':''}
      <div class="heart ${isFav(p._id)?'on':''}" data-fav="${p._id}">${heartSvg}</div>
      <img class="ph" loading="lazy" decoding="async" src="${p.cover||''}" alt="${p.nome}">
      <div class="meta"><div class="nm">${p.nome}</div>
        <div class="br"><span>${p.marca}</span><span class="chip">${p.tipo}</span></div></div>
    </div>`).join('');
  grid._list = list;
  grid.querySelectorAll('.cardp').forEach(c=>{
    c.onclick=e=>{ if(e.target.closest('.heart')) return; openLb(grid._list[+c.dataset.i]); };
  });
  grid.querySelectorAll('.heart').forEach(h=>h.onclick=e=>{e.stopPropagation(); toggleFav(h.dataset.fav);});
}

// ---- lightbox ----
let lbCur=null, lbIdx=0;
function openLb(p){ lbCur=p; lbIdx=0; paintLb(); document.getElementById('lb').classList.add('open'); }
function closeLb(){ document.getElementById('lb').classList.remove('open'); lbCur=null; }
function paintLb(){
  const p=lbCur, fotos=(p.fotos&&p.fotos.length)?p.fotos:[p.cover];
  document.getElementById('lbImg').src = fotos[lbIdx]||'';
  document.getElementById('lbNome').textContent = p.nome;
  document.getElementById('lbMarca').innerHTML = `<b>${p.marca}</b> · ${p.tipo}${p.esgotado?' · <span style="color:var(--like)">esgotado</span>':''}`;
  document.getElementById('lbCores').innerHTML = (p.cores||[]).map(c=>`<span>${c}</span>`).join('') || '<span style="color:#bbb">—</span>';
  document.getElementById('lbLink').href = p.link;
  document.getElementById('lbThumbs').innerHTML = fotos.map((f,i)=>`<img src="${f}" data-t="${i}" class="${i===lbIdx?'on':''}">`).join('');
  document.querySelectorAll('#lbThumbs img').forEach(t=>t.onclick=()=>{lbIdx=+t.dataset.t; paintLb();});
  paintLbFav();
}
function paintLbFav(){ const b=document.getElementById('lbFav'); const on=isFav(lbCur._id);
  b.classList.toggle('on',on); b.textContent = on?'♥ favoritado':'♡ favoritar'; }
function lbStep(d){ const n=(lbCur.fotos&&lbCur.fotos.length)?lbCur.fotos.length:1; lbIdx=(lbIdx+d+n)%n; paintLb(); }
document.getElementById('lbPrev').onclick=()=>lbStep(-1);
document.getElementById('lbNext').onclick=()=>lbStep(1);
document.getElementById('lbClose').onclick=closeLb;
document.getElementById('lbFav').onclick=()=>toggleFav(lbCur._id);
document.getElementById('lb').onclick=e=>{ if(e.target.id==='lb') closeLb(); };
document.addEventListener('keydown',e=>{ if(!document.getElementById('lb').classList.contains('open'))return;
  if(e.key==='Escape')closeLb(); if(e.key==='ArrowLeft')lbStep(-1); if(e.key==='ArrowRight')lbStep(1); });

// ---- favoritos toggle + print ----
document.getElementById('favToggle').onclick=()=>{ state.favs=!state.favs; render(); };
document.getElementById('printBtn').onclick=()=>{
  const list=P.filter(p=>isFav(p._id));
  if(!list.length){ alert('Você ainda não favoritou nenhum produto. Clique no ♥ dos que gostar e tente de novo.'); return; }
  document.getElementById('printArea').innerHTML =
    `<h2>Referências favoritas — ${list.length} peças (${DADOS.gerado})</h2><div class="pgrid">`+
    list.map(p=>`<div class="pcard"><img src="${p.cover}"><div class="pc"><b>${p.nome}</b>${p.marca} · ${p.tipo} · ref ${p.cod||'-'}</div></div>`).join('')+`</div>`;
  window.print();
};

render();
</script>
